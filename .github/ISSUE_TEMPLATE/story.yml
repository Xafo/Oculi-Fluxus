name: Story Request
description: Submit a project requirement for autonomous delivery
title: "story: "
labels: ["backlog", "pm-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What needs to be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What business result is expected?
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Technical, legal, timeline, or scope constraints.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Prefer Given/When/Then.
    validations:
      required: true
